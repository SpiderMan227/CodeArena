version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codearena-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: codearena
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codearena-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
